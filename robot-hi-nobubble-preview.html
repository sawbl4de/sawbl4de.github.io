<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cute robot (no bubble) — preview &amp; snippet</title>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@800&family=IBM+Plex+Mono:wght@400&display=swap"
    rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: #0D1014;
      color: #EEF2F8;
      font-family: 'Archivo', system-ui, sans-serif;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    /* matches your real hero: h1.big = clamp(40px,7.2vw,78px) */
    .demo {
      display: flex;
      align-items: center;
      gap: 22px;
      flex-wrap: wrap;
    }

    .demo h1.big {
      font-weight: 800;
      font-size: clamp(40px, 7.2vw, 78px);
      line-height: .97;
      letter-spacing: -.025em;
      margin: 0;
    }

    .note {
      position: fixed;
      bottom: 18px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: #586472;
      letter-spacing: .06em;
    }
  </style>
</head>

<body>

  <!-- ===== paste this wrapper into your hero, keeping your existing <h1> ===== -->
  <div style="display:flex;align-items:center;gap:22px;flex-wrap:wrap">
    <h1 class="big">Prithu Paresh&nbsp;Das</h1>

    <svg class="hi-bot" viewBox="26 9 68 86" style="height:clamp(60px,10.5vw,108px);width:auto;flex:0 0 auto"
      xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cute robot waving hello">
      <defs>
        <linearGradient id="botsteel" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#1b2330" />
          <stop offset="1" stop-color="#0e131b" />
        </linearGradient>
      </defs>

      <!-- robot : gentle body bob -->
      <g>
        <!-- antenna -->
        <line x1="54" y1="30" x2="54" y2="18" stroke="#5C9DFF" stroke-width="2.4" stroke-linecap="round" />
        <circle cx="54" cy="16" r="3" fill="#5BD6C6">
          <animate attributeName="r" values="3;4.3;3" dur="1.5s" repeatCount="indefinite" />
        </circle>

        <!-- left arm (static) -->
        <line x1="40" y1="69" x2="33" y2="80" stroke="#5C9DFF" stroke-width="7" stroke-linecap="round" />
        <circle cx="33" cy="81" r="3.5" fill="url(#botsteel)" stroke="#5C9DFF" stroke-width="1.4" />

        <!-- right arm : waves about the shoulder -->
        <g>
          <line x1="68" y1="69" x2="80" y2="52" stroke="#5C9DFF" stroke-width="7" stroke-linecap="round" />
          <circle cx="81" cy="51" r="4" fill="url(#botsteel)" stroke="#5BD6C6" stroke-width="1.6" />
          <animateTransform attributeName="transform" type="rotate" values="-14 68 69; 18 68 69; -14 68 69"
            keyTimes="0;0.5;1" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" dur="1.5s"
            repeatCount="indefinite" />
        </g>

        <!-- body -->
        <rect x="40" y="63" width="28" height="24" rx="7" fill="url(#botsteel)" stroke="#5C9DFF" stroke-width="1.6" />
        <circle cx="54" cy="73" r="3" fill="#5BD6C6" />
        <rect x="44" y="86" width="7" height="6" rx="2" fill="url(#botsteel)" stroke="#5C9DFF" stroke-width="1.2" />
        <rect x="57" y="86" width="7" height="6" rx="2" fill="url(#botsteel)" stroke="#5C9DFF" stroke-width="1.2" />

        <!-- head -->
        <rect x="34" y="30" width="40" height="32" rx="10" fill="url(#botsteel)" stroke="#5C9DFF" stroke-width="1.8" />

        <!-- eyes (blink) -->
        <rect x="45" y="41" width="6" height="10" rx="3" fill="#5BD6C6">
          <animate attributeName="height" values="10;10;1.5;10" keyTimes="0;0.86;0.92;1" dur="3.4s"
            repeatCount="indefinite" />
          <animate attributeName="y" values="41;41;45;41" keyTimes="0;0.86;0.92;1" dur="3.4s"
            repeatCount="indefinite" />
        </rect>
        <rect x="57" y="41" width="6" height="10" rx="3" fill="#5BD6C6">
          <animate attributeName="height" values="10;10;1.5;10" keyTimes="0;0.86;0.92;1" dur="3.4s"
            repeatCount="indefinite" />
          <animate attributeName="y" values="41;41;45;41" keyTimes="0;0.86;0.92;1" dur="3.4s"
            repeatCount="indefinite" />
        </rect>

        <!-- smile -->
        <path d="M48 55 Q54 60 60 55" fill="none" stroke="#5C9DFF" stroke-width="2.4" stroke-linecap="round" />

        <animateTransform attributeName="transform" type="translate" values="0 0; 0 -2.2; 0 0" keyTimes="0;0.5;1"
          calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" dur="2.6s" repeatCount="indefinite" />
      </g>
    </svg>
  </div>

  <div class="note">Preview only — open in a browser to watch the robot wave.</div>

</body>

</html>
