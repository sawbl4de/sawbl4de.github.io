<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Footer gears — preview &amp; snippet</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Archivo:wght@800&family=IBM+Plex+Mono:wght@400&display=swap"
    rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: #07090C;
      color: #EEF2F8;
      font-family: 'Archivo', system-ui, sans-serif;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    /* this mimics your existing .foot-grid / h2 so you see it in context */
    .demo {
      display: flex;
      align-items: center;
      gap: 26px;
      flex-wrap: wrap;
    }

    .demo h2 {
      font-weight: 800;
      font-size: clamp(38px, 6vw, 64px);
      letter-spacing: -.03em;
      line-height: .98;
      margin: 0;
    }

    .note {
      position: fixed;
      bottom: 18px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: #586472;
      letter-spacing: .06em;
    }
  </style>
</head>

<body>

  <!-- ===== this is exactly what you paste into your footer ===== -->
  <div class="demo">
    <h2>Let's talk<br>hardware.</h2>

    <svg class="footer-gears" viewBox="0 0 176 124" width="178" style="flex:0 0 auto"
      xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Meshing gears animation">
      <defs>
        <linearGradient id="steelA" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#1b2330" />
          <stop offset="1" stop-color="#0e131b" />
        </linearGradient>
        <linearGradient id="steelB" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#172029" />
          <stop offset="1" stop-color="#0d1218" />
        </linearGradient>
      </defs>

      <!-- big gear : clockwise -->
      <g>
        <path
          d="M 96.00,62.00 L 95.90,64.87 L 103.51,68.87 L 102.60,73.52 L 94.04,74.36 L 92.04,79.36 L 90.70,81.90 L 95.82,88.80 L 92.98,92.60 L 84.91,89.64 L 80.94,93.27 L 78.63,94.98 L 80.25,103.42 L 76.05,105.61 L 70.05,99.45 L 64.90,101.00 L 62.08,101.54 L 59.87,109.84 L 55.14,109.99 L 52.41,101.84 L 47.10,101.00 L 44.32,100.26 L 38.73,106.79 L 34.40,104.87 L 35.48,96.34 L 31.06,93.27 L 28.88,91.40 L 21.01,94.86 L 17.94,91.25 L 22.62,84.04 L 19.96,79.36 L 18.81,76.72 L 10.22,76.42 L 9.02,71.84 L 16.36,67.37 L 16.00,62.00 L 16.10,59.13 L 8.49,55.13 L 9.40,50.48 L 17.96,49.64 L 19.96,44.64 L 21.30,42.10 L 16.18,35.20 L 19.02,31.40 L 27.09,34.36 L 31.06,30.73 L 33.37,29.02 L 31.75,20.58 L 35.95,18.39 L 41.95,24.55 L 47.10,23.00 L 49.92,22.46 L 52.13,14.16 L 56.86,14.01 L 59.59,22.16 L 64.90,23.00 L 67.68,23.74 L 73.27,17.21 L 77.60,19.13 L 76.52,27.66 L 80.94,30.73 L 83.12,32.60 L 90.99,29.14 L 94.06,32.75 L 89.38,39.96 L 92.04,44.64 L 93.19,47.28 L 101.78,47.58 L 102.98,52.16 L 95.64,56.63 Z"
          fill="url(#steelA)" stroke="#5C9DFF" stroke-width="1.4" stroke-linejoin="round" />
        <circle cx="56" cy="62" r="14" fill="#0B0E13" stroke="#5C9DFF" stroke-width="1.2" />
        <circle cx="56" cy="62" r="4.4" fill="#5C9DFF" />
        <circle cx="80.00" cy="62.00" r="2.1" fill="#0B0E13" />
        <circle cx="68.00" cy="82.78" r="2.1" fill="#0B0E13" />
        <circle cx="44.00" cy="82.78" r="2.1" fill="#0B0E13" />
        <circle cx="32.00" cy="62.00" r="2.1" fill="#0B0E13" />
        <circle cx="44.00" cy="41.22" r="2.1" fill="#0B0E13" />
        <circle cx="68.00" cy="41.22" r="2.1" fill="#0B0E13" />
        <animateTransform attributeName="transform" type="rotate" from="0 56 62" to="360 56 62" dur="9s"
          repeatCount="indefinite" />
      </g>

      <!-- small gear : counter-clockwise, 1.4x faster (14/10) -->
      <g>
        <path
          d="M 151.00,62.00 L 150.86,64.71 L 157.32,68.79 L 156.06,73.32 L 148.43,73.50 L 145.84,77.87 L 144.14,79.98 L 146.96,87.08 L 143.29,90.00 L 137.01,85.66 L 132.34,87.68 L 129.72,88.39 L 127.84,95.78 L 123.15,95.99 L 120.62,88.79 L 115.66,87.68 L 113.12,86.71 L 107.25,91.59 L 103.33,89.00 L 105.52,81.68 L 102.16,77.87 L 100.67,75.60 L 93.06,76.09 L 91.41,71.69 L 97.48,67.06 L 97.00,62.00 L 97.14,59.29 L 90.68,55.21 L 91.94,50.68 L 99.57,50.50 L 102.16,46.13 L 103.86,44.02 L 101.04,36.92 L 104.71,34.00 L 110.99,38.34 L 115.66,36.32 L 118.28,35.61 L 120.16,28.22 L 124.85,28.01 L 127.38,35.21 L 132.34,36.32 L 134.88,37.29 L 140.75,32.41 L 144.67,35.00 L 142.48,42.32 L 145.84,46.13 L 147.33,48.40 L 154.94,47.91 L 156.59,52.31 L 150.52,56.94 Z"
          fill="url(#steelB)" stroke="#5BD6C6" stroke-width="1.4" stroke-linejoin="round" />
        <circle cx="124" cy="62" r="10" fill="#0B0E13" stroke="#5BD6C6" stroke-width="1.2" />
        <circle cx="124" cy="62" r="3.4" fill="#5BD6C6" />
        <circle cx="140.50" cy="62.00" r="2.1" fill="#0B0E13" />
        <circle cx="129.10" cy="77.69" r="2.1" fill="#0B0E13" />
        <circle cx="110.65" cy="71.70" r="2.1" fill="#0B0E13" />
        <circle cx="110.65" cy="52.30" r="2.1" fill="#0B0E13" />
        <circle cx="129.10" cy="46.31" r="2.1" fill="#0B0E13" />
        <animateTransform attributeName="transform" type="rotate" from="0 124 62" to="-360 124 62" dur="6.43s"
          repeatCount="indefinite" />
      </g>
    </svg>
  </div>

  <div class="note">Preview only — open this file in a browser to watch the gears turn.</div>

</body>

</html>
